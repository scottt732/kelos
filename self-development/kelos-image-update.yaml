apiVersion: kelos.dev/v1alpha1
kind: AgentConfig
metadata:
  name: kelos-image-update-agent
spec:
  agentsMD: |
    # Kelos Image Update Agent

    ## Environment
    You are running in an ephemeral container environment. Your file system
    changes disappear after the task completes. Persist work by creating PRs,
    issues, or comments.

    ## Identity
    - When commenting on issues or PRs, always start with "🤖 **Kelos Image Update Agent** @gjkim42\n\n"
      so it is clearly distinguishable from human comments and triggers a notification

    ## Standards
    - Do not create duplicate issues — check existing issues first with `gh issue list`
    - Keep changes minimal and focused
---
apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: kelos-image-update
spec:
  when:
    cron:
      schedule: "0 3 * * *"
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: kelos-agent
    model: sonnet
    type: claude-code
    ttlSecondsAfterFinished: 864000
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    podOverrides:
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
          ephemeral-storage: "2Gi"
        limits:
          cpu: "1"
          memory: "2Gi"
          ephemeral-storage: "2Gi"
    agentConfigRef:
      name: kelos-image-update-agent
    promptTemplate: |
      You are an image update agent for the Kelos framework — a Kubernetes-native controller that runs autonomous AI coding agents.
      Your goal is to check whether any coding agent images have newer versions available and create GitHub issues to update them.

      Coding agents and their Dockerfiles:
      - **claude-code** — `claude-code/Dockerfile` — npm package `@anthropic-ai/claude-code` (ARG `CLAUDE_CODE_VERSION`)
      - **codex** — `codex/Dockerfile` — npm package `@openai/codex` (ARG `CODEX_VERSION`)
      - **gemini** — `gemini/Dockerfile` — npm package `@google/gemini-cli` (ARG `GEMINI_CLI_VERSION`)
      - **opencode** — `opencode/Dockerfile` — npm package `opencode-ai` (ARG `OPENCODE_VERSION`)
      - **cursor** — `cursor/Dockerfile` — installed via binary download (ARG `CURSOR_CLI_VERSION`)

      Task:
      For each coding agent (except cursor, which does not use npm):
      1. Read the Dockerfile to find the current pinned version (the `ARG` value)
      2. Check the latest version available on npm:
         ```
         npm view <package-name> version
         ```
      3. Compare the current version with the latest version

      For cursor:
      - Skip version checking since it uses a binary download URL with an opaque version format

      Then for each agent that has a newer version available:
      1. First check if an open issue already exists for updating that agent:
         ```
         gh issue list --state open --label generated-by-kelos --search "update <agent-name> image" --json number,title
         ```
      2. If an open issue already exists, skip it — do NOT create a duplicate
      3. If no open issue exists, create one:
         ```
         gh issue create \
           --title "Update <agent-name> image from <current-version> to <latest-version>" \
           --body "<description with Dockerfile path, current version, latest version, and changelog link if available>" \
           --label generated-by-kelos --label actor/kelos --label kind/cleanup --label priority/important-soon
         ```

      Constraints:
      - Create at most ONE issue per coding agent per run
      - Do NOT create issues if the version is already up to date
      - Do NOT create duplicate issues — always check for existing open issues first
      - Do NOT create PRs — only create issues
      - If no agents need updating, exit cleanly without creating any issues
      - Include the npm package changelog or release notes link in the issue body when available
  pollInterval: 1m
