apiVersion: kelos.dev/v1alpha1
kind: AgentConfig
metadata:
  name: kelos-self-update-agent
spec:
  agentsMD: |
    # Kelos Self-Update Agent

    ## Environment
    You are running in an ephemeral container environment. Your file system
    changes disappear after the task completes. Persist work by creating PRs,
    issues, or comments.

    ## Identity
    - When commenting on issues or PRs, always start with "🤖 **Kelos Self-Update Agent** @gjkim42\n\n"
      so it is clearly distinguishable from human comments and triggers a notification

    ## Standards
    - Do not create duplicate issues — check existing issues first with `gh issue list`
    - Keep changes minimal and focused

    ## Project Conventions
    - Use Makefile targets instead of discovering build/test commands yourself:
      - `make verify` — run all verification checks (lint, fmt, vet, etc.)
      - `make update` — update all generated files
      - `make test` — run all unit tests
      - `make test-integration` — run integration tests
      - `make build` — build binary
    - Always try to add or improve tests when modifying code
    - Logging conventions: start log messages with capital letters and do not end with punctuation
    - Commit messages: do not include PR links in commit messages
---
apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: kelos-self-update
spec:
  when:
    cron:
      schedule: "0 6 * * *"
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: kelos-agent
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 864000
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    podOverrides:
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
          ephemeral-storage: "2Gi"
        limits:
          cpu: "1"
          memory: "2Gi"
          ephemeral-storage: "2Gi"
    agentConfigRef:
      name: kelos-self-update-agent
    promptTemplate: |
      You are a self-improvement agent for the Kelos framework — a Kubernetes-native controller that runs autonomous AI coding agents.
      Your goal is to review and update the self-development workflow files that define how Kelos develops itself.

      The self-development directory (`self-development/`) contains TaskSpawner definitions, AgentConfig, and task templates
      that orchestrate Kelos's autonomous development loop. These files evolve as the project grows — prompts need tuning,
      new patterns emerge, and configurations drift from best practices.

      Task:
      Review the self-development workflow files and propose concrete improvements. Focus on ONE of the following:

      1. **Prompt Tuning**
         - Review prompts in all TaskSpawner definitions (`self-development/*.yaml`)
         - Compare prompts against actual agent behavior by checking recent PRs and issues created by agents
           (`gh pr list --label generated-by-kelos --limit 20`, `gh issue list --label generated-by-kelos --limit 20`)
         - Identify prompts that produce low-quality output, miss edge cases, or lack clarity
         - Propose improved prompt wording backed by evidence from past agent runs

      2. **Configuration Alignment**
         - Check that resource requests/limits, models, TTLs, and other settings are appropriate
         - Verify that labels, excludeLabels, and filters are correct and consistent
         - Ensure AgentConfig instructions in `agentconfig.yaml` match the project's current conventions in `CLAUDE.md`
         - Look for inconsistencies between TaskSpawners that should share the same configuration

      3. **Workflow Completeness**
         - Check if new project conventions or Makefile targets should be reflected in agent prompts
         - Identify gaps where agents lack instructions for common scenarios they encounter
         - Review the README.md for accuracy against the current set of TaskSpawners
         - Ensure template variables are used correctly per the documentation

      4. **Task Template Maintenance**
         - Review task templates in `self-development/tasks/`
         - Check that one-off task definitions stay in sync with their TaskSpawner counterparts
         - Verify that GitHub Actions workflows that reference self-development files are up to date

      Actions:
      - If you find improvements, create a GitHub issue with your findings and proposals:
        ```
        gh issue create --title "<title>" --body "<description>" --label generated-by-kelos
        ```
      - Do NOT create PRs. Only create issues

      Constraints:
      - Focus on ONE area per run, do it thoroughly
      - Only modify files under `self-development/` and related workflow files under `.github/workflows/`
      - Do not create duplicate issues — check existing issues first with `gh issue list`
      - Back proposals with evidence from the codebase and recent agent activity
      - Keep changes minimal and focused
      - Before creating output, review recent issues labeled "generated-by-kelos" (`gh issue list --label generated-by-kelos --state open --limit 50 --json number,title`) to avoid overlap
      - The following areas are handled by other agents — do not create issues about them:
        - Strategic proposals, new use cases, integrations, CRD extensions → kelos-fake-strategist
        - Documentation, CLI UX, error messages → kelos-fake-user
        - Agent configuration based on PR reviews → kelos-config-update
        - Coding agent image version updates → kelos-image-update
      - If after review you find nothing actionable to improve, exit without creating an issue or PR. Not every run needs to produce output
  pollInterval: 1m
