{{- if .Values.webhookServer.gateway.enabled }}
{{- $githubEnabled := .Values.webhookServer.sources.github.enabled }}
{{- $linearEnabled := .Values.webhookServer.sources.linear.enabled }}
{{- $genericEnabled := .Values.webhookServer.sources.generic.enabled }}
{{- if or $githubEnabled $linearEnabled $genericEnabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.webhookServer.gateway.gatewayName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kelos
    app.kubernetes.io/component: webhook-gateway
  {{- with .Values.webhookServer.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.webhookServer.gateway.gatewayClassName }}
  gatewayClassName: {{ .Values.webhookServer.gateway.gatewayClassName }}
  {{- end }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: {{ .Values.webhookServer.gateway.host | quote }}
      {{- if not .Values.webhookServer.gateway.tls.enabled }}
      allowedRoutes:
        namespaces:
          from: Same
      {{- end }}
    {{- if .Values.webhookServer.gateway.tls.enabled }}
    - name: https
      port: 443
      protocol: HTTPS
      hostname: {{ .Values.webhookServer.gateway.host | quote }}
      tls:
        mode: Terminate
        {{- if .Values.webhookServer.gateway.tls.certificateRefs }}
        certificateRefs:
          {{- toYaml .Values.webhookServer.gateway.tls.certificateRefs | nindent 10 }}
        {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kelos-webhook-routes
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kelos
    app.kubernetes.io/component: webhook-routes
spec:
  parentRefs:
    - name: {{ .Values.webhookServer.gateway.gatewayName }}
      {{- if .Values.webhookServer.gateway.tls.enabled }}
      sectionName: https
      {{- else }}
      sectionName: http
      {{- end }}
  hostnames:
    - {{ .Values.webhookServer.gateway.host | quote }}
  rules:
    {{- if $githubEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /webhook/github
      backendRefs:
        - name: kelos-webhook-github
          port: 8443
    {{- end }}
    {{- if $linearEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /webhook/linear
      backendRefs:
        - name: kelos-webhook-linear
          port: 8443
    {{- end }}
    {{- if $genericEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /webhook/
      backendRefs:
        - name: kelos-webhook-generic
          port: 8443
    {{- end }}
{{- end }}
{{- end }}
